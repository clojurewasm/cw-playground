# fly.io config for the ClojureWasm playground. Root-context Dockerfile, so this
# deploys by selecting the repo ("Deploy from GitHub") or `fly launch`. Local and
# fly run the same app; only [env] differs. See DEPLOY.md.

app = "cw-playground"
primary_region = "nrt"            # Tokyo; change to your nearest region.

[build]
  dockerfile = "Dockerfile"

[env]
  PG_PORT = "8080"
  PG_PUBLIC_DIR = "/app/resources/public"
  PG_WASM_DIR = "/app/modules"
  PG_EXAMPLES = "/app/resources/examples.edn"
  CLJW_FS_ROOT = "/app"           # FS-jail: confine all slurp/File ops to the app dir.
  # PG_EVAL_* bound each /api/eval submission (with-budget), NOT the process —
  # CLJW_EVAL_* here would meter + kill the server itself.
  PG_EVAL_MAX_STEPS = "50000000"
  PG_EVAL_DEADLINE_MS = "5000"
  PG_EVAL_MAX_HEAP_MB = "128"

[http_service]
  internal_port = 8080            # must match PG_PORT (the app's 0.0.0.0 listen port).
  force_https = true
  auto_stop_machines = "stop"     # scale to zero when idle (a demo); cold-start is cheap.
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
